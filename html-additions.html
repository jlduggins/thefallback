<!-- ═══════════════════════════════════════════════════════════════════════
     JOURNEY DETAIL PANEL
     Add after location-detail-panel (after line ~471 in index.html)
     ═══════════════════════════════════════════════════════════════════════ -->

<div id="journey-detail-panel" style="
  display:none;
  position:fixed;
  z-index:600;
  background:var(--bg,#f2f0eb);
  overflow:hidden;
  flex-direction:column;
  /* Desktop: sits to the right of the drawer */
  top:0; bottom:0;
  left:320px; right:0;
  max-width:380px;
  border-right:1px solid var(--border);
  box-shadow:4px 0 20px rgba(0,0,0,0.1);
">
  <!-- Content injected by Trips.openJourneyDetail() -->
</div>

<!-- Mobile: override to full-height panel from bottom -->
<style>
@media (max-width: 640px) {
  #journey-detail-panel {
    left: 0 !important;
    right: 0 !important;
    max-width: 100% !important;
    top: 60px !important;
    border-right: none !important;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15) !important;
  }
}
</style>


<!-- ═══════════════════════════════════════════════════════════════════════
     JOURNEY MENU ITEM STYLE
     Add to your CSS (components.css or inline in index.html <style> block)
     ═══════════════════════════════════════════════════════════════════════ -->

<style>
.jmenu-item {
  display: block;
  width: 100%;
  padding: 10px 14px;
  border: none;
  background: none;
  text-align: left;
  font-size: 13px;
  color: var(--forest, #163F2E);
  cursor: pointer;
  transition: background 0.12s;
}
.jmenu-item:hover { background: rgba(127,195,165,0.12); }
</style>


<!-- ═══════════════════════════════════════════════════════════════════════
     LEG MODAL (Add / Edit destination)
     Add after fuel-modal in index.html
     ═══════════════════════════════════════════════════════════════════════ -->

<div class="confirm-overlay" id="leg-modal" onclick="handleLegModalOverlayClick(event)">
  <div class="confirm-box" style="max-width:380px;max-height:90vh;overflow-y:auto;text-align:left" onclick="event.stopPropagation()">
    <h3 style="font-size:18px;font-weight:700;margin-bottom:16px;color:var(--forest)">📍 Add destination</h3>

    <!-- From -->
    <div style="margin-bottom:16px">
      <label style="font-size:12px;font-weight:600;color:var(--text-mid);display:block;margin-bottom:4px">From</label>
      <input type="hidden" id="leg-from-id"/>
      <div id="leg-from-selected" style="display:none;background:rgba(127,195,165,0.15);border-radius:8px;padding:10px 12px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span id="leg-from-name" style="font-size:13px;font-weight:600;color:var(--forest)">Starting point</span>
          <button onclick="clearLegOrigin()" style="background:none;border:none;color:var(--text-muted);font-size:14px;cursor:pointer">✕</button>
        </div>
      </div>
      <input class="inp" type="text" id="leg-from-search" placeholder="Search or use current location..." oninput="searchLocationsForLegFrom(this.value)" onfocus="showFromOptions()" style="width:100%;display:none"/>
      <div id="leg-from-results" style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;display:none;margin-top:4px"></div>
    </div>

    <!-- To -->
    <div style="margin-bottom:16px">
      <label style="font-size:12px;font-weight:600;color:var(--text-mid);display:block;margin-bottom:4px">To</label>
      <input class="inp" type="text" id="leg-search" placeholder="Search your locations..." oninput="searchLocationsForLeg(this.value)" onfocus="showToOptions()" style="width:100%"/>
      <div id="leg-search-results" style="max-height:150px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;display:none;margin-top:4px"></div>
      <input type="hidden" id="leg-dest-id"/>
      <div id="leg-dest-selected" style="display:none;background:rgba(127,195,165,0.15);border-radius:8px;padding:10px 12px;margin-top:8px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span id="leg-dest-name" style="font-size:13px;font-weight:600;color:var(--forest)"></span>
          <button onclick="clearLegDestination()" style="background:none;border:none;color:var(--text-muted);font-size:14px;cursor:pointer">✕</button>
        </div>
      </div>
      <button onclick="addNewLocationFromLeg()" style="margin-top:8px;background:none;border:none;color:var(--teal);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px">
        <span>+</span> Add new location
      </button>
    </div>

    <!-- Dates -->
    <div style="display:flex;justify-content:space-between;margin-bottom:16px">
      <div style="width:calc(50% - 8px)">
        <label style="font-size:12px;font-weight:600;color:var(--text-mid);display:block;margin-bottom:4px">Arrive</label>
        <input class="inp" type="date" id="leg-arrive" style="width:100%"/>
      </div>
      <div style="width:calc(50% - 8px)">
        <label style="font-size:12px;font-weight:600;color:var(--text-mid);display:block;margin-bottom:4px">Depart</label>
        <input class="inp" type="date" id="leg-depart" style="width:100%"/>
      </div>
    </div>

    <!-- Route preview -->
    <div id="leg-preview" style="background:rgba(127,195,165,0.1);border-radius:8px;padding:12px;margin-bottom:16px;display:none">
      <div style="font-size:10px;font-weight:700;color:var(--teal);margin-bottom:8px;text-transform:uppercase">Route preview</div>
      <div style="display:flex;justify-content:space-between">
        <div><div id="leg-distance" style="font-size:18px;font-weight:700;color:var(--forest)">--</div><div style="font-size:10px;color:var(--text-muted)">Distance</div></div>
        <div style="text-align:center"><div id="leg-duration" style="font-size:18px;font-weight:700;color:var(--forest)">--</div><div style="font-size:10px;color:var(--text-muted)">Drive time</div></div>
        <div style="text-align:right"><div id="leg-fuel" style="font-size:18px;font-weight:700;color:var(--forest)">--</div><div style="font-size:10px;color:var(--text-muted)">Est. fuel</div></div>
      </div>
    </div>

    <!-- Per-leg fuel settings -->
    <div id="leg-fuel-settings" style="background:rgba(88,111,107,0.05);border-radius:8px;padding:12px;margin-bottom:16px;display:none">
      <div onclick="toggleLegFuelExpand()" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer">
        <div style="font-size:12px;font-weight:600;color:var(--text-mid)">⛽ Fuel price for this leg</div>
        <span id="leg-fuel-toggle" style="font-size:12px;color:var(--text-muted)">▼</span>
      </div>
      <div id="leg-fuel-expanded" style="display:none;margin-top:12px">
        <div style="display:flex;gap:10px;align-items:end">
          <div style="flex:1">
            <label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:4px">Price</label>
            <div style="display:flex;align-items:center">
              <span style="font-size:14px;color:var(--text-mid);margin-right:4px">$</span>
              <input class="inp" type="number" step="0.01" id="leg-fuel-price" style="width:100%" oninput="updateLegFuelPreview()"/>
            </div>
          </div>
          <div style="flex:1">
            <label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:4px">Per</label>
            <select class="inp" id="leg-fuel-unit" style="width:100%" onchange="updateLegFuelPreview()">
              <option value="gal">Gallon</option>
              <option value="L">Liter</option>
            </select>
          </div>
        </div>
        <div style="margin-top:8px;font-size:11px;color:var(--text-muted)">
          Your default: <span id="leg-fuel-default"></span>
        </div>
      </div>
    </div>

    <!-- Backup suggestions -->
    <div id="leg-backups" style="display:none;background:rgba(245,158,11,0.1);border-radius:8px;padding:10px 12px;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:14px">💡</span>
        <div style="flex:1;font-size:12px;color:#92400e">
          <span id="leg-backup-count" style="font-weight:600">0 backup options</span> within <span id="leg-backup-radius">30</span>mi
        </div>
        <button onclick="showBackupOptions()" style="background:none;border:none;color:#92400e;font-size:12px;font-weight:600;cursor:pointer">View</button>
      </div>
    </div>

    <!-- Notes -->
    <div style="margin-bottom:20px">
      <label style="font-size:12px;font-weight:600;color:var(--text-mid);display:block;margin-bottom:4px">Notes (optional)</label>
      <textarea class="inp" id="leg-notes" rows="2" placeholder="Reservation #, backup plans..." style="width:100%;resize:none"></textarea>
    </div>

    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button onclick="closeLegModal()" style="padding:10px 18px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:white;font-weight:600;font-size:14px;color:var(--text-mid)">Cancel</button>
      <button id="leg-save-btn" onclick="saveLeg()" style="padding:10px 20px;border-radius:var(--radius-sm);border:none;background:var(--teal);color:white;font-weight:700;font-size:14px">Add</button>
    </div>
  </div>
</div>


<!-- ═══════════════════════════════════════════════════════════════════════
     SEND TO MAPS MODAL
     ═══════════════════════════════════════════════════════════════════════ -->

<div class="confirm-overlay" id="maps-modal" onclick="if(event.target.id==='maps-modal')closeMapsModal()">
  <div class="confirm-box" style="max-width:320px;text-align:left" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="font-size:18px;font-weight:700;color:var(--forest);margin:0">Send to Maps</h3>
      <button onclick="closeMapsModal()" style="background:none;border:none;font-size:18px;color:var(--text-muted);cursor:pointer">✕</button>
    </div>
    <div id="maps-modal-content">
      <!-- Content populated by Trips.openSendToMapsModal() -->
    </div>
  </div>
</div>


<!-- ═══════════════════════════════════════════════════════════════════════
     MAPS APP PICKER MODAL
     ═══════════════════════════════════════════════════════════════════════ -->

<div class="confirm-overlay" id="maps-picker-modal" onclick="if(event.target.id==='maps-picker-modal')closeMapsPickerModal()">
  <div class="confirm-box" style="max-width:280px;text-align:center" onclick="event.stopPropagation()">
    <h3 style="font-size:16px;font-weight:700;color:var(--forest);margin-bottom:16px">Open with</h3>
    <button onclick="openInAppleMaps()" style="width:100%;padding:14px;border-radius:8px;border:1px solid var(--border);background:white;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px">🗺 Apple Maps</button>
    <button onclick="openInGoogleMaps()" style="width:100%;padding:14px;border-radius:8px;border:1px solid var(--border);background:white;font-size:14px;font-weight:600;cursor:pointer">📍 Google Maps</button>
  </div>
</div>
